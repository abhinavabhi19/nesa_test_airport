{% extends 'base.html' %}

{% block content %}

<h2 class="text-2xl font-bold mb-4">Longest Route</h2>

{% if route %}
<div class="p-4 bg-blue-100 rounded">
    <p class="text-lg">
        {{ route.source.code }} → {{ route.destination.code }} ({{ route.distance_km }} km)
    </p>
</div>
{% else %}
<p>No data available</p>
{% endif %}

{% endblock %}
