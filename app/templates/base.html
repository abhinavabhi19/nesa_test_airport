<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Flight Routes System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <!-- NAVBAR -->
    <nav class="bg-blue-600 text-white p-4 shadow">
        <div class="max-w-7xl mx-auto flex justify-between">
            <h1 class="font-bold text-lg">Flight Routes</h1>

            <div class="space-x-4">
                <a href="{% url 'route_list' %}" class="hover:underline">Home</a>
                <a href="{% url 'add_route' %}" class="hover:underline">Add Route</a>
                <a href="{% url 'add_airport' %}" class="hover:underline">Add Airport</a>
                <a href="{% url 'longest_route' %}" class="hover:underline">Longest</a>
                <a href="{% url 'shortest_route' %}" class="hover:underline">Shortest</a>
                <a href="{% url 'nth_route' %}" class="hover:underline">Nth</a>
            </div>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="max-w-5xl mx-auto mt-8 bg-white p-6 rounded-xl shadow">
        {% block content %}
        {% endblock %}
    </div>

</body>

</html>
